manifest:
  dag_id: dag_c
  format_version: 1
  kind: airflow_dag_manifest
  warnings: null
dag:
  dag_id: dag_c
  fileloc: /opt/airflow/dags/dag_c.py
  schedule: '@daily'
  tags:
  - demo
  - dependency
  catchup: false
  start_date: '2025-01-01T00:00:00+00:00'
global_topological_order:
- start
- wait_for_dag_a_complete
- wait_for_dag_b_complete
- wait_for_ready_file_from_a
- fanout_1.f1
- fanout_1.f2
- fanout_1.f3
- fanout_1.f4
- fanout_1.f5
- processing.p1
- processing.p2
- processing.p3
- processing.p4
- processing.p5
- processing.p6
- publish.pub1
- publish.pub2
- publish.pub3
- c_complete
global_execution_waves:
- wave: 0
  parallel_tasks:
  - start
- wave: 1
  parallel_tasks:
  - wait_for_dag_a_complete
  - wait_for_dag_b_complete
  - wait_for_ready_file_from_a
- wave: 2
  parallel_tasks:
  - fanout_1.f1
- wave: 3
  parallel_tasks:
  - fanout_1.f2
  - fanout_1.f3
  - fanout_1.f4
- wave: 4
  parallel_tasks:
  - fanout_1.f5
- wave: 5
  parallel_tasks:
  - processing.p1
- wave: 6
  parallel_tasks:
  - processing.p2
  - processing.p3
- wave: 7
  parallel_tasks:
  - processing.p4
- wave: 8
  parallel_tasks:
  - processing.p5
  - processing.p6
- wave: 9
  parallel_tasks:
  - publish.pub1
  - publish.pub2
- wave: 10
  parallel_tasks:
  - publish.pub3
- wave: 11
  parallel_tasks:
  - c_complete
execution_order:
  description: Segments follow global topological order; a new segment starts when registry_key changes. local_execution_waves use only in-segment dependencies (same wave may run in parallel). For edges between segments see each task under tasks.<task_id>.upstream_task_ids and global_topological_order.
  segments:
  - segment_index: 0
    registry_key: __root__
    task_group_id: null
    local_execution_waves:
    - wave: 0
      parallel_tasks:
      - start
    - wave: 1
      parallel_tasks:
      - wait_for_dag_a_complete
      - wait_for_dag_b_complete
      - wait_for_ready_file_from_a
  - segment_index: 1
    registry_key: fanout_1
    task_group_id: fanout_1
    local_execution_waves:
    - wave: 0
      parallel_tasks:
      - fanout_1.f1
    - wave: 1
      parallel_tasks:
      - fanout_1.f2
      - fanout_1.f3
      - fanout_1.f4
    - wave: 2
      parallel_tasks:
      - fanout_1.f5
  - segment_index: 2
    registry_key: processing
    task_group_id: processing
    local_execution_waves:
    - wave: 0
      parallel_tasks:
      - processing.p1
    - wave: 1
      parallel_tasks:
      - processing.p2
      - processing.p3
    - wave: 2
      parallel_tasks:
      - processing.p4
    - wave: 3
      parallel_tasks:
      - processing.p5
      - processing.p6
  - segment_index: 3
    registry_key: publish
    task_group_id: publish
    local_execution_waves:
    - wave: 0
      parallel_tasks:
      - publish.pub1
      - publish.pub2
    - wave: 1
      parallel_tasks:
      - publish.pub3
  - segment_index: 4
    registry_key: __root__
    task_group_id: null
    local_execution_waves:
    - wave: 0
      parallel_tasks:
      - c_complete
tasks:
  start:
    task_id: start
    task_type: EmptyOperator
    operator_class: airflow.providers.standard.operators.empty.EmptyOperator
    trigger_rule: all_success
    weight_rule: downstream
    upstream_task_ids: []
    downstream_task_ids:
    - wait_for_dag_a_complete
    - wait_for_dag_b_complete
    - wait_for_ready_file_from_a
    placement:
      registry_key: __root__
      task_group: null
      local_task_id: start
      task_group_path: []
      parent_task_group: null
    allow_nested_operators: true
    depends_on_past: false
    do_xcom_push: true
    email_on_failure: true
    email_on_retry: true
    executor_config: {}
    has_on_execute_callback: false
    has_on_failure_callback: false
    has_on_retry_callback: false
    has_on_skipped_callback: false
    has_on_success_callback: false
