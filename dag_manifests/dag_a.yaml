manifest:
  dag_id: dag_a
  format_version: 1
  kind: airflow_dag_manifest
  warnings: null
dag:
  dag_id: dag_a
  fileloc: /opt/airflow/dags/dag_a.py
  schedule: '@daily'
  tags:
  - demo
  - dependency
  catchup: false
  start_date: '2025-01-01T00:00:00+00:00'
global_topological_order:
- start
- hello_add
- branch_on_sum
- branch_bash_ok
- branch_bash_else
- after_branch_join
- extract.extract_1
- extract.extract_2
- extract.extract_3
- extract.extract_4
- transform.transform_1
- transform.transform_2
- transform.transform_3
- transform.transform_4
- transform.transform_5
- load.load_1
- load.load_2
- load.load_3
- write_ready_file
- a_complete
global_execution_waves:
- wave: 0
  parallel_tasks:
  - start
- wave: 1
  parallel_tasks:
  - hello_add
- wave: 2
  parallel_tasks:
  - branch_on_sum
- wave: 3
  parallel_tasks:
  - branch_bash_else
  - branch_bash_ok
- wave: 4
  parallel_tasks:
  - after_branch_join
- wave: 5
  parallel_tasks:
  - extract.extract_1
- wave: 6
  parallel_tasks:
  - extract.extract_2
  - extract.extract_3
- wave: 7
  parallel_tasks:
  - extract.extract_4
- wave: 8
  parallel_tasks:
  - transform.transform_1
- wave: 9
  parallel_tasks:
  - transform.transform_2
  - transform.transform_3
- wave: 10
  parallel_tasks:
  - transform.transform_4
- wave: 11
  parallel_tasks:
  - transform.transform_5
- wave: 12
  parallel_tasks:
  - load.load_1
  - load.load_2
- wave: 13
  parallel_tasks:
  - load.load_3
- wave: 14
  parallel_tasks:
  - write_ready_file
- wave: 15
  parallel_tasks:
  - a_complete
execution_order:
  description: Segments follow global topological order; a new segment starts when registry_key changes. local_execution_waves use only in-segment dependencies (same wave may run in parallel). For edges between segments see each task under tasks.<task_id>.upstream_task_ids and global_topological_order.
  segments:
  - segment_index: 0
    registry_key: __root__
    task_group_id: null
    local_execution_waves:
    - wave: 0
      parallel_tasks:
      - start
    - wave: 1
      parallel_tasks:
      - hello_add
    - wave: 2
      parallel_tasks:
      - branch_on_sum
    - wave: 3
      parallel_tasks:
      - branch_bash_else
      - branch_bash_ok
    - wave: 4
      parallel_tasks:
      - after_branch_join
  - segment_index: 1
    registry_key: extract
    task_group_id: extract
    local_execution_waves:
    - wave: 0
      parallel_tasks:
      - extract.extract_1
    - wave: 1
      parallel_tasks:
      - extract.extract_2
      - extract.extract_3
    - wave: 2
      parallel_tasks:
      - extract.extract_4
  - segment_index: 2
    registry_key: transform
    task_group_id: transform
    local_execution_waves:
    - wave: 0
      parallel_tasks:
      - transform.transform_1
    - wave: 1
      parallel_tasks:
      - transform.transform_2
      - transform.transform_3
    - wave: 2
      parallel_tasks:
      - transform.transform_4
    - wave: 3
      parallel_tasks:
      - transform.transform_5
  - segment_index: 3
    registry_key: load
    task_group_id: load
    local_execution_waves:
    - wave: 0
      parallel_tasks:
      - load.load_1
      - load.load_2
    - wave: 1
      parallel_tasks:
      - load.load_3
  - segment_index: 4
    registry_key: __root__
    task_group_id: null
    local_execution_waves:
    - wave: 0
      parallel_tasks:
      - write_ready_file
    - wave: 1
      parallel_tasks:
      - a_complete
