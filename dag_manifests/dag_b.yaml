manifest:
  dag_id: dag_b
  format_version: 1
  kind: airflow_dag_manifest
  warnings: null
dag:
  dag_id: dag_b
  fileloc: /opt/airflow/dags/dag_b.py
  schedule: '@daily'
  tags:
  - demo
  - dependency
  catchup: false
  start_date: '2025-01-01T00:00:00+00:00'
global_topological_order:
- start
- stage_1.s1_1
- stage_1.s1_2
- stage_1.s1_3
- stage_1.s1_4
- stage_2.s2_1
- stage_2.s2_2
- stage_2.s2_3
- stage_2.s2_4
- stage_2.s2_5
- stage_3.s3_1
- stage_3.s3_2
- stage_3.s3_3
- b_complete
global_execution_waves:
- wave: 0
  parallel_tasks:
  - start
- wave: 1
  parallel_tasks:
  - stage_1.s1_1
- wave: 2
  parallel_tasks:
  - stage_1.s1_2
  - stage_1.s1_3
- wave: 3
  parallel_tasks:
  - stage_1.s1_4
- wave: 4
  parallel_tasks:
  - stage_2.s2_1
- wave: 5
  parallel_tasks:
  - stage_2.s2_2
  - stage_2.s2_3
  - stage_2.s2_4
- wave: 6
  parallel_tasks:
  - stage_2.s2_5
- wave: 7
  parallel_tasks:
  - stage_3.s3_1
- wave: 8
  parallel_tasks:
  - stage_3.s3_2
  - stage_3.s3_3
- wave: 9
  parallel_tasks:
  - b_complete
execution_order:
  description: Segments follow global topological order; a new segment starts when registry_key changes. local_execution_waves use only in-segment dependencies (same wave may run in parallel). For edges between segments see each task under tasks.<task_id>.upstream_task_ids and global_topological_order.
  segments:
  - segment_index: 0
    registry_key: __root__
    task_group_id: null
    local_execution_waves:
    - wave: 0
      parallel_tasks:
      - start
  - segment_index: 1
    registry_key: stage_1
    task_group_id: stage_1
    local_execution_waves:
    - wave: 0
      parallel_tasks:
      - stage_1.s1_1
    - wave: 1
      parallel_tasks:
      - stage_1.s1_2
      - stage_1.s1_3
    - wave: 2
      parallel_tasks:
      - stage_1.s1_4
  - segment_index: 2
    registry_key: stage_2
    task_group_id: stage_2
    local_execution_waves:
    - wave: 0
      parallel_tasks:
      - stage_2.s2_1
    - wave: 1
      parallel_tasks:
      - stage_2.s2_2
      - stage_2.s2_3
      - stage_2.s2_4
    - wave: 2
      parallel_tasks:
      - stage_2.s2_5
  - segment_index: 3
    registry_key: stage_3
    task_group_id: stage_3
    local_execution_waves:
    - wave: 0
      parallel_tasks:
      - stage_3.s3_1
    - wave: 1
      parallel_tasks:
      - stage_3.s3_2
      - stage_3.s3_3
  - segment_index: 4
    registry_key: __root__
    task_group_id: null
    local_execution_waves:
    - wave: 0
      parallel_tasks:
      - b_complete
