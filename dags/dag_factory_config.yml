dag_a:
  default_args:
    owner: airflow
    start_date: '2025-01-01T00:00:00+00:00'
  schedule: '@daily'
  catchup: false
  tags:
  - demo
  - dependency
  task_groups:
    extract:
      tooltip: 'Task group: extract'
    transform:
      tooltip: 'Task group: transform'
    load:
      tooltip: 'Task group: load'
  tasks:
    start:
      operator: airflow.providers.standard.operators.empty.EmptyOperator
    hello_add:
      operator: airflow.providers.standard.operators.python.PythonOperator
      python_callable: include.dag_a_callables.hello_add
      op_kwargs:
        x: 10
        y: 32
      dependencies:
      - start
    branch_on_sum:
      operator: airflow.providers.standard.operators.python.BranchPythonOperator
      python_callable: include.dag_a_callables.pick_branch_after_sum
      dependencies:
      - hello_add
    branch_bash_ok:
      operator: airflow.providers.standard.operators.bash.BashOperator
      bash_command: 'echo "branch: sum is positive (hello from bash)"'
      dependencies:
      - branch_on_sum
    branch_bash_else:
      operator: airflow.providers.standard.operators.bash.BashOperator
      bash_command: 'echo "branch: sum is zero or negative (hello from bash)"'
      dependencies:
      - branch_on_sum
    after_branch_join:
      operator: airflow.providers.standard.operators.empty.EmptyOperator
      trigger_rule: none_failed_min_one_success
      dependencies:
      - branch_bash_else
      - branch_bash_ok
    extract_1:
      operator: airflow.providers.standard.operators.empty.EmptyOperator
      dependencies:
      - after_branch_join
      task_group_name: extract
    extract_2:
      operator: airflow.providers.standard.operators.empty.EmptyOperator
      dependencies:
      - extract_1
      task_group_name: extract
    extract_3:
      operator: airflow.providers.standard.operators.empty.EmptyOperator
      dependencies:
      - extract_1
      task_group_name: extract
    extract_4:
      operator: airflow.providers.standard.operators.empty.EmptyOperator
      dependencies:
      - extract_2
      - extract_3
      task_group_name: extract
    transform_1:
      operator: airflow.providers.standard.operators.empty.EmptyOperator
      dependencies:
      - extract_4
      task_group_name: transform
    transform_2:
      operator: airflow.providers.standard.operators.empty.EmptyOperator
      dependencies:
      - transform_1
      task_group_name: transform
    transform_3:
      operator: airflow.providers.standard.operators.empty.EmptyOperator
      dependencies:
      - transform_1
      task_group_name: transform
    transform_4:
      operator: airflow.providers.standard.operators.empty.EmptyOperator
      dependencies:
      - transform_2
      - transform_3
      task_group_name: transform
    transform_5:
      operator: airflow.providers.standard.operators.empty.EmptyOperator
      dependencies:
      - transform_4
      task_group_name: transform
    load_1:
      operator: airflow.providers.standard.operators.empty.EmptyOperator
      dependencies:
      - transform_5
      task_group_name: load
    load_2:
      operator: airflow.providers.standard.operators.empty.EmptyOperator
      dependencies:
      - transform_5
      task_group_name: load
    load_3:
      operator: airflow.providers.standard.operators.empty.EmptyOperator
      dependencies:
      - load_1
      - load_2
      task_group_name: load
    write_ready_file:
      operator: airflow.providers.standard.operators.python.PythonOperator
      python_callable: include.dag_a_callables.write_ready_file
      op_args:
      - /opt/airflow/data/from_a/ready.txt
      dependencies:
      - load_3
    a_complete:
      operator: airflow.providers.standard.operators.empty.EmptyOperator
      dependencies:
      - write_ready_file
