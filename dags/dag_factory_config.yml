dag_c:
  default_args:
    owner: airflow
    start_date: '2025-01-01T00:00:00+00:00'
  schedule: '@daily'
  catchup: false
  tags:
  - demo
  - dependency
  task_groups:
    fanout_1:
      tooltip: 'Task group: fanout_1'
    processing:
      tooltip: 'Task group: processing'
    publish:
      tooltip: 'Task group: publish'
  tasks:
    start:
      operator: airflow.providers.standard.operators.empty.EmptyOperator
    wait_for_dag_a_complete:
      operator: airflow.providers.standard.sensors.external_task.ExternalTaskSensor
      external_dag_id: dag_a
      external_task_id: a_complete
      mode: reschedule
      timeout: 21600
      poke_interval: 30
      allowed_states:
      - success
      failed_states:
      - failed
      - skipped
      - upstream_failed
      dependencies:
      - start
    wait_for_dag_b_complete:
      operator: airflow.providers.standard.sensors.external_task.ExternalTaskSensor
      external_dag_id: dag_b
      external_task_id: b_complete
      mode: reschedule
      timeout: 21600
      poke_interval: 30
      allowed_states:
      - success
      failed_states:
      - failed
      - skipped
      - upstream_failed
      dependencies:
      - start
    wait_for_ready_file_from_a:
      operator: airflow.providers.standard.sensors.python.PythonSensor
      python_callable: include.dag_c_callables._ready_file_exists
      mode: reschedule
      timeout: 21600
      poke_interval: 15
      dependencies:
      - start
    f1:
      operator: airflow.providers.standard.operators.empty.EmptyOperator
      dependencies:
      - wait_for_dag_a_complete
      - wait_for_dag_b_complete
      - wait_for_ready_file_from_a
      task_group_name: fanout_1
    f2:
      operator: airflow.providers.standard.operators.empty.EmptyOperator
      dependencies:
      - f1
      task_group_name: fanout_1
    f3:
      operator: airflow.providers.standard.operators.empty.EmptyOperator
      dependencies:
      - f1
      task_group_name: fanout_1
    f4:
      operator: airflow.providers.standard.operators.empty.EmptyOperator
      dependencies:
      - f1
      task_group_name: fanout_1
    f5:
      operator: airflow.providers.standard.operators.empty.EmptyOperator
      dependencies:
      - f2
      - f3
      - f4
      task_group_name: fanout_1
    p1:
      operator: airflow.providers.standard.operators.empty.EmptyOperator
      dependencies:
      - f5
      task_group_name: processing
    p2:
      operator: airflow.providers.standard.operators.empty.EmptyOperator
      dependencies:
      - p1
      task_group_name: processing
    p3:
      operator: airflow.providers.standard.operators.empty.EmptyOperator
      dependencies:
      - p1
      task_group_name: processing
    p4:
      operator: airflow.providers.standard.operators.empty.EmptyOperator
      dependencies:
      - p2
      - p3
      task_group_name: processing
    p5:
      operator: airflow.providers.standard.operators.empty.EmptyOperator
      dependencies:
      - p4
      task_group_name: processing
    p6:
      operator: airflow.providers.standard.operators.empty.EmptyOperator
      dependencies:
      - p4
      task_group_name: processing
    pub1:
      operator: airflow.providers.standard.operators.empty.EmptyOperator
      dependencies:
      - p5
      - p6
      task_group_name: publish
    pub2:
      operator: airflow.providers.standard.operators.empty.EmptyOperator
      dependencies:
      - p5
      - p6
      task_group_name: publish
    pub3:
      operator: airflow.providers.standard.operators.empty.EmptyOperator
      dependencies:
      - pub1
      - pub2
      task_group_name: publish
    c_complete:
      operator: airflow.providers.standard.operators.empty.EmptyOperator
      dependencies:
      - pub3
